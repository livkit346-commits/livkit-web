<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LivKit | Live Streaming & Social</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    
    <!-- App Entry Styles -->
    
    <style>
        .material-symbols-outlined { text-transform: none !important; }
        :root {
            --bg-dark: #000000;
            --primary-accent: #ff0050;
            --text-main: #FFFFFF;
        }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        .app-container {
            display: flex; flex-direction: column;
            height: 100vh; height: 100dvh;
            width: 100%; max-width: 600px;
            margin: 0 auto;
            position: relative;
            background-color: black;
        }
        .main-content {
            flex: 1; overflow-y: auto; overflow-x: hidden;
            position: relative; scrollbar-width: none;
        }
        .main-content::-webkit-scrollbar { display: none; }
        
        /* Navigation */
        .bottom-nav {
            display: flex; justify-content: space-around; align-items: center;
            background-color: #000000; height: 75px;
            padding-bottom: env(safe-area-inset-bottom, 0);
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            z-index: 1000;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; color: rgba(255, 255, 255, 0.7);
            font-size: 11px; flex: 1; transition: color 0.2s ease; gap: 3px;
        }
        .nav-item.active { color: #ffffff; }
        .go-live-btn {
            display: flex; align-items: center; justify-content: center;
            width: 48px; height: 32px; background-color: #ffffff;
            border-radius: 8px; text-decoration: none; color: #000000;
        }
    </style>
  <script type="module" crossorigin src="/assets/index-CtgmEWWP.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-CGQFuDZu.css">
</head>
<body>
    <div class="app-container">
        <!-- Content Area -->
        <main id="app" class="main-content">
            <!-- Loading state or initial feed UI will be injected here -->
            <div class="flex items-center justify-center h-full">
                <div class="text-white text-xl animate-pulse">Loading LivKit...</div>
            </div>
        </main>

        <!-- Global Navigation -->
        <nav class="bottom-nav">
            <a href="/" class="nav-item active">
                <span class="material-symbols-outlined">home</span>
                <span>Home</span>
            </a>
            <a href="/live" class="nav-item">
                <span class="material-symbols-outlined">wifi_tethering</span>
                <span>Live</span>
            </a>
            <div class="go-live-container">
                <a href="/go-live" class="go-live-btn">
                    <span class="material-symbols-outlined">add</span>
                </a>
            </div>
            <a href="/chat" class="nav-item">
                <span class="material-symbols-outlined">chat_bubble</span>
                <span>Chat</span>
            </a>
            <a href="/profile" class="nav-item">
                <span class="material-symbols-outlined">person</span>
                <span>Profile</span>
            </a>
        </nav>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
