{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Sign In - LivKit</title>
   <!-- Bootstrap CSS -->
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
   <!-- FontAwesome for Icons -->
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
   <style>
      body,
      html {
         height: 100%;
         margin: 0;
         font-family: 'Inter', sans-serif;
         background: linear-gradient(135deg, #0F2027 0%, #203A43 50%, #2C5364 100%);
         display: flex;
         align-items: center;
         justify-content: center;
      }

      .login-container {
         width: 100%;
         max-width: 400px;
         padding: 2rem;
         animation: slideUpFade 1s cubic-bezier(0.165, 0.84, 0.44, 1);
      }

      @keyframes slideUpFade {
         0% {
            opacity: 0;
            transform: translateY(30px);
         }

         100% {
            opacity: 1;
            transform: translateY(0);
         }
      }

      .title {
         font-size: 2rem;
         font-weight: 700;
         color: #ffffff;
         margin-bottom: 0.5rem;
      }

      .subtitle {
         color: rgba(255, 255, 255, 0.7);
         margin-bottom: 2.5rem;
      }

      .form-control,
      .input-group-text {
         background-color: rgba(255, 255, 255, 0.1);
         border: none;
         color: #ffffff;
         padding: 1rem 1.25rem;
      }

      .form-control {
         border-radius: 14px;
         margin-bottom: 1.25rem;
      }

      /* Adjust input group to look unified */
      .input-group .form-control {
         border-top-right-radius: 0;
         border-bottom-right-radius: 0;
         margin-bottom: 0;
      }

      .input-group .input-group-text {
         border-top-right-radius: 14px;
         border-bottom-right-radius: 14px;
         cursor: pointer;
         color: rgba(255, 255, 255, 0.7);
         transition: color 0.2s;
      }

      .input-group .input-group-text:hover {
         color: #ffffff;
      }

      .form-control:focus {
         background-color: rgba(255, 255, 255, 0.15);
         color: #ffffff;
         box-shadow: none;
      }

      .input-group:focus-within .input-group-text,
      .input-group:focus-within .form-control {
         background-color: rgba(255, 255, 255, 0.15);
      }

      .form-control::placeholder {
         color: rgba(255, 255, 255, 0.54);
      }

      .forgot-link {
         color: rgba(255, 255, 255, 0.7);
         text-decoration: none;
         font-size: 0.9rem;
         display: block;
         text-align: right;
         margin-bottom: 1.5rem;
      }

      .forgot-link:hover {
         color: #ffffff;
      }

      .btn-primary {
         background-color: #7C4DFF;
         border: none;
         border-radius: 14px;
         padding: 1rem;
         font-weight: 700;
         letter-spacing: 1px;
         width: 100%;
         transition: background-color 0.3s ease;
      }

      .btn-primary:hover {
         background-color: #651FFF;
      }

      .signup-link {
         color: rgba(255, 255, 255, 0.7);
         text-decoration: none;
         text-align: center;
         display: block;
         margin-top: 1.5rem;
      }

      .signup-link:hover {
         color: #ffffff;
      }

      .alert-danger {
         background-color: rgba(220, 53, 69, 0.2);
         color: #ff6b6b;
         border: 1px solid rgba(220, 53, 69, 0.5);
         border-radius: 14px;
      }
   </style>
</head>

<body>

   <div class="login-container">
      <h1 class="title">Welcome Back</h1>
      <p class="subtitle">Sign in to continue streaming</p>

      {% if error %}
      <div class="alert alert-danger text-center" role="alert">
         {{ error }}
      </div>
      {% endif %}

      <form method="post">
         {% csrf_token %}
         <input type="email" name="email" class="form-control" placeholder="Email" required autocomplete="email">

         <div class="input-group mb-4">
            <input type="password" name="password" id="passwordField" class="form-control" placeholder="Password"
               required>
            <span class="input-group-text" id="togglePassword">
               <i class="fa-regular fa-eye"></i>
            </span>
         </div>

         <a href="{% url 'recover-password' %}" class="forgot-link">Forgot password?</a>

         <button type="submit" class="btn btn-primary">LOGIN</button>
      </form>

      <a href="{% url 'signup' %}" class="signup-link">Create an account</a>
   </div>

   <script>
      const togglePassword = document.querySelector('#togglePassword');
      const passwordField = document.querySelector('#passwordField');

      togglePassword.addEventListener('click', function () {
         // Toggle the type attribute
         const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
         passwordField.setAttribute('type', type);

         // Toggle the icon
         const icon = this.querySelector('i');
         icon.classList.toggle('fa-eye');
         icon.classList.toggle('fa-eye-slash');
      });
   </script>

   <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
   <script>
      const SUPABASE_URL = "{{ SUPABASE_URL|default:'' }}";
      const SUPABASE_ANON_KEY = "{{ SUPABASE_ANON_KEY|default:'' }}";

      if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
         console.error("Supabase configuration missing!");
      }

      const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      document.querySelector('form').addEventListener('submit', async (e) => {
         if (!e.target.email) return;

         e.preventDefault();
         const email = e.target.email.value;
         const password = e.target.password.value;
         const submitBtn = e.target.querySelector('button[type="submit"]');
         submitBtn.disabled = true;
         submitBtn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> LOGGING IN...';

         // Clear existing custom errors
         const existingError = document.getElementById('supabase-auth-error');
         if (existingError) existingError.remove();

         try {
            const { data, error } = await supabase.auth.signInWithPassword({
               email: email,
               password: password,
            });

            if (error) throw error;

            const session = data.session;
            const accessToken = session.access_token;

            // Submit the session token to Django backend
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = ''; 

            const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

            const csrfInput = document.createElement('input');
            csrfInput.type = 'hidden';
            csrfInput.name = 'csrfmiddlewaretoken';
            csrfInput.value = csrfToken;
            form.appendChild(csrfInput);

            const idTokenInput = document.createElement('input');
            idTokenInput.type = 'hidden';
            idTokenInput.name = 'id_token'; // Keep the field name for backend compatibility
            idTokenInput.value = accessToken;
            form.appendChild(idTokenInput);

            document.body.appendChild(form);
            form.submit();
         } catch (error) {
            console.error("Supabase Login Error", error);
            const errorDiv = document.createElement('div');
            errorDiv.id = 'supabase-auth-error';
            errorDiv.className = 'alert alert-danger text-center';
            errorDiv.innerText = error.message;
            document.querySelector('.subtitle').after(errorDiv);

            submitBtn.disabled = false;
            submitBtn.innerHTML = 'LOGIN';
         }
      });
   </script>
</body>

</html>
