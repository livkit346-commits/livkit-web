{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LivKit</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet">
    <style>
        .material-symbols-outlined {
            text-transform: none !important;
        }

        :root {
            --bg-dark: #0F172A;
            --bg-nav: #1E293B;
            --primary-accent: #7C4DFF;
            --text-main: #FFFFFF;
            --text-muted: #94A3B8;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            /* Prevent body scroll, handled by views */
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            /* Dynamic viewport height for mobile browsers */
            width: 100%;
            max-width: 600px;
            /* Constrain width on desktop to look like a phone */
            margin: 0 auto;
            position: relative;
            background-color: black;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            scrollbar-width: none;
            /* Firefox */
        }

        .main-content::-webkit-scrollbar {
            display: none;
            /* Chrome, Safari and Opera */
        }

        /* Bottom Navigation Bar */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background-color: #000000;
            height: 75px;
            padding-bottom: env(safe-area-inset-bottom, 0);
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.7);
            font-size: 11px;
            flex: 1;
            transition: color 0.2s ease;
            gap: 3px;
        }

        .nav-item .material-symbols-outlined {
            font-size: 24px;
        }

        .nav-item.active {
            color: #ffffff;
            font-weight: normal;
        }

        .nav-item.active .material-symbols-outlined {
            color: #ffffff;
        }

        .nav-item:hover {
            color: #ffffff;
        }

        /* Special styling for Go Live button (+) */
        .go-live-container {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        .go-live-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 32px;
            background-color: #ffffff;
            border-radius: 8px;
            text-decoration: none;
            color: #000000;
            transition: transform 0.2s;
        }

        .go-live-btn .material-symbols-outlined {
            font-size: 28px;
            color: #000000;
            font-variation-settings: 'wght' 600;
        }

        .go-live-btn:hover {
            transform: scale(1.05);
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>

    <div class="app-container">

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>

        <nav class="bottom-nav">
            <a href="{% url 'dashboard' %}"
                class="nav-item {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
                <span class="material-symbols-outlined">home</span>
                <span>Home</span>
            </a>
            <a href="{% url 'live' %}"
                class="nav-item {% if request.resolver_match.url_name == 'live' %}active{% endif %}">
                <span class="material-symbols-outlined">wifi_tethering</span>
                <span>Live</span>
            </a>
            <div class="go-live-container">
                <a href="{% url 'go_live' %}" class="go-live-btn">
                    <span class="material-symbols-outlined">add</span>
                </a>
            </div>
            <a href="{% url 'chat' %}"
                class="nav-item {% if request.resolver_match.url_name == 'chat' %}active{% endif %}">
                <span class="material-symbols-outlined">chat_bubble</span>
                <span>Chat</span>
            </a>
            <a href="{% url 'userprofile' %}"
                class="nav-item {% if request.resolver_match.url_name == 'userprofile' %}active{% endif %}">
                <span class="material-symbols-outlined">person</span>
                <span>Profile</span>
            </a>
        </nav>

    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    {% block extra_js %}{% endblock %}
</body>

</html>
