{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Reset Password - LivKit</title>
   <!-- Bootstrap CSS -->
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
   <style>
      body,
      html {
         height: 100%;
         margin: 0;
         font-family: 'Inter', sans-serif;
         background: linear-gradient(135deg, #0F2027 0%, #203A43 50%, #2C5364 100%);
         display: flex;
         align-items: center;
         justify-content: center;
      }

      .login-container {
         width: 100%;
         max-width: 400px;
         padding: 2rem;
         animation: slideUpFade 1s cubic-bezier(0.165, 0.84, 0.44, 1);
      }

      @keyframes slideUpFade {
         0% {
            opacity: 0;
            transform: translateY(30px);
         }

         100% {
            opacity: 1;
            transform: translateY(0);
         }
      }

      .title {
         font-size: 2rem;
         font-weight: 700;
         color: #ffffff;
         margin-bottom: 0.5rem;
         text-align: center;
      }

      .subtitle {
         color: rgba(255, 255, 255, 0.7);
         margin-bottom: 2.5rem;
         text-align: center;
         font-size: 0.95rem;
      }

      .form-control {
         background-color: rgba(255, 255, 255, 0.1);
         border: none;
         border-radius: 14px;
         color: #ffffff;
         padding: 1rem 1.25rem;
         margin-bottom: 1.25rem;
      }

      .form-control:focus {
         background-color: rgba(255, 255, 255, 0.15);
         color: #ffffff;
         box-shadow: none;
      }

      .form-control::placeholder {
         color: rgba(255, 255, 255, 0.54);
      }

      .btn-primary {
         background-color: #7C4DFF;
         border: none;
         border-radius: 14px;
         padding: 1rem;
         font-weight: 700;
         letter-spacing: 1px;
         width: 100%;
         transition: background-color 0.3s ease;
         margin-top: 1rem;
      }

      .btn-primary:hover {
         background-color: #651FFF;
      }

      .alert-danger {
         background-color: rgba(220, 53, 69, 0.2);
         color: #ff6b6b;
         border: 1px solid rgba(220, 53, 69, 0.5);
         border-radius: 14px;
      }

      .back-link {
         color: rgba(255, 255, 255, 0.7);
         text-decoration: none;
         text-align: center;
         display: block;
         margin-top: 1.5rem;
      }

      .back-link:hover {
         color: #ffffff;
      }
   </style>
</head>

<body>

   <div class="login-container">
      <h1 class="title">Reset Password</h1>
      <p class="subtitle">Enter your email address and we'll send you instructions to reset your password.</p>

      {% if error %}
      <div class="alert alert-danger text-center" role="alert">
         {{ error }}
      </div>
      {% endif %}

      <form method="post">
         {% csrf_token %}
         <input type="email" name="email" class="form-control" placeholder="Email" required autocomplete="email">

         <button type="submit" class="btn btn-primary">RESET</button>
      </form>

      <a href="{% url 'signin' %}" class="back-link">Back to Sign In</a>
   </div>

</body>

</html>
