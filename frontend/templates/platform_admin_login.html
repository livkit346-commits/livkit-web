<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Admin Login - LivKit</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Material Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        body {
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Abstract Premium Background */
        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(144, 19, 254, 0.15) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }

        .login-card {
            background: rgba(25, 25, 25, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            z-index: 1;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .login-logo {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #b06ab3, #4568dc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .login-subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            margin-bottom: 30px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-floating > label {
            color: rgba(255, 255, 255, 0.5);
        }

        .form-control {
            background-color: rgba(0, 0, 0, 0.2) !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff !important;
            border-radius: 12px;
        }

        .form-control:focus {
            border-color: #9013FE;
            box-shadow: 0 0 0 0.25rem rgba(144, 19, 254, 0.25);
        }

        .btn-primary {
            background: linear-gradient(135deg, #b06ab3, #4568dc);
            border: none;
            border-radius: 12px;
            font-weight: 600;
            padding: 12px;
            margin-top: 15px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(176, 106, 179, 0.6);
        }
        
        .alert-error {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.2);
            color: #ff6b6b;
            border-radius: 10px;
            padding: 12px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <div class="login-card">
        <div class="mb-4">
            <span class="material-symbols-outlined" style="font-size: 48px; color: #fff;">shield_person</span>
        </div>
        <div class="login-logo">LivKit</div>
        <div class="login-subtitle">Secure Admin Portal</div>

        {% if error %}
        <div class="alert-error">
            <span class="material-symbols-outlined">error</span>
            <div>{{ error }}</div>
        </div>
        {% endif %}

        <form method="POST" action="{% url 'platform_admin_login' %}">
            {% csrf_token %}
            
            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="emailInput" name="email" placeholder="name@example.com" required>
                <label for="emailInput">Admin Email Address</label>
            </div>
            
            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="passwordInput" name="password" placeholder="Password" required>
                <label for="passwordInput">Password</label>
            </div>
            
            <button class="btn btn-primary w-100" type="submit">Access Dashboard</button>
        </form>
        
        <div class="mt-4" style="font-size: 0.8rem; color: rgba(255,255,255,0.3);">
            <p class="mb-0">Unauthorized access is strictly prohibited.</p>
        </div>
    </div>
</body>
</html>
